name: Distributed Load Test

on:
  workflow_dispatch:
    inputs:
      threads:
        description: "Virtual users per worker"
        required: true
        default: "20"
      duration:
        description: "Test duration in seconds"
        required: true
        default: "120"
      rampup:
        description: "Ramp-up time in seconds"
        required: true
        default: "15"
      workers:
        description: "Number of JMeter workers (1-3, keep <=3 on free runner)"
        required: true
        default: "2"
      target_url:
        description: "Target base URL"
        required: true
        default: "https://jsonplaceholder.typicode.com/posts"

jobs:
  load-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Clean previous results
        run: rm -rf results && mkdir -p results

      - name: Install Docker Compose
        run: |
          sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64 \
            -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Create results directory
        run: mkdir -p results

      - name: Run JMeter distributed load test
        run: |
          THREADS=${{ inputs.threads }} \
          DURATION=${{ inputs.duration }} \
          RAMPUP=${{ inputs.rampup }} \
          WORKERS=${{ inputs.workers }} \
          TARGET_URL="${{ inputs.target_url }}" \
          docker-compose up --build --force-recreate --abort-on-container-exit --exit-code-from jmeter-master

      - name: Tear down containers
        if: always()
        run: docker-compose down --remove-orphans

      - name: Upload raw results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results-run-${{ github.run_number }}
          path: results/results.jtl
          retention-days: 90

      - name: Deploy HTML report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./results/html-report
          destination_dir: .